server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # o service worker deve ser sempre revalidado (não cachear o sw.js no nginx)
    location = /sw.js {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # assets com hash do Next podem ser cacheados agressivamente
    location /_next/static/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # rotas do app. Com trailingSlash do Next, cada rota é um diretório com
    # index.html (ex.: /read/ → /read/index.html). A ordem abaixo resolve, nesta
    # sequência: arquivo exato → index.html do diretório → variante .html →
    # por fim a home (SPA-style) só quando nada casa.
    location / {
        try_files $uri $uri/index.html $uri.html $uri/ /index.html;
    }
}
